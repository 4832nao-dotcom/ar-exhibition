<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>body { margin: 0; overflow: hidden; }</style>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: ./targets.mind; filterMinCF:0.0001; filterBeta: 10;" embedded vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-assets>
        <video id="ar-video" src="./私の映画2.mov" preload="auto" loop="true" playsinline webkit-playsinline muted></video>


      </a-assets>
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#ar-video" width="300" height="170" position="0 0 1"></a-video>

      </a-entity>
    </a-scene>
    <script>
      document.body.addEventListener('click', () => {
        const v = document.querySelector('#ar-video');
        v.muted = false;
        v.play();
      });
    </script>
  </body>
</html>
