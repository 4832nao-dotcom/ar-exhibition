<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
    </style>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled:false">
      
      <a-assets>
        <video id="ar-video" src="./ar-exhibition.mp4" preload="auto" loop="true" muted="true" playsinline webkit-playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#ar-video" width="1" height="0.707" rotation="0 0 0" position="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      // ブラウザの制限対策：画面タップで動画再生
      document.body.addEventListener('click', () => {
        const video = document.querySelector('#ar-video');
        video.play();
      });
    </script>
  </body>
</html>
