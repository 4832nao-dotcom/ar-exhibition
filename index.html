<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>body { margin: 0; overflow: hidden; }</style>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: ./targets.mind; filterMinCF:0.0001; filterBeta: 10;" embedded vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-assets>
        <video id="ar-video" src="./test.mp4.MOV" preload="auto" loop="true" playsinline webkit-playsinline muted crossorigin="anonymous"></video>
      </a-assets>
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#ar-video" width="1" height="1.3" position="0 0 0.1"></a-video>
      </a-entity>
    </a-scene>
    <script>
      const v = document.querySelector('#ar-video');
      const scene = document.querySelector('a-scene');

      // iPhoneの「音だけ病」を治す強制再生スイッチ
      window.addEventListener('touchstart', () => {
        v.play().then(() => {
          v.muted = false;
          console.log("Video playing");
        }).catch(e => console.error(e));
      }, {once: true});

      // 映像が止まって見えないのを防ぐループ処理
      scene.addEventListener('render-target-loaded', () => {
        setInterval(() => {
          if (!v.paused && v.readyState === 4) {
            v.style.display = 'none'; v.offsetHeight; v.style.display = 'block';
          }
        }, 1000);
      });
    </script>
  </body>
</html>
